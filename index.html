<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KingTop Industrial (Hong Kong) Limited</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
<div class="container nav">
<div class="logo">
<h2 data-key="company_name"></h2>
<span data-key="company_subtitle"></span>
</div>
<nav>
<a href="#about" data-key="menu_about"></a>
<a href="#products" data-key="menu_products"></a>
<a href="#equipment" data-key="menu_equipment"></a>
<a href="#contact" data-key="menu_contact"></a>
</nav>
<select id="languageSwitcher">
<option value="en">English</option>
<option value="zh">繁體中文</option>
<option value="tr">Türkçe</option>
</select>
</div>
</header>

<section class="hero">
<div class="container">
<h1 data-key="hero_title"></h1>
<p data-key="hero_desc"></p>
<a href="#contact" class="btn" data-key="hero_button"></a>
</div>
</section>

<section id="about" class="container"><h2 data-key="about_title"></h2><p data-key="about_desc"></p></section>
<section id="products" class="container"><h2 data-key="products_title"></h2></section>
<section id="equipment" class="container"><h2 data-key="equipment_title"></h2></section>
<section id="contact" class="container"><h2 data-key="contact_title"></h2></section>

<script src="js/translations.js"></script>
</body>
</html>
